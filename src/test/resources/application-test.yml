workhub:
  messaging:
    enabled: false

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  health:
    rabbit:
      enabled: false

jwt:
  secret: change-this-in-prod-change-this-in-prod-change-this-in-prod-change-this

logging:
  level:
    com.workhub: DEBUG
